  - aid: blues-wireless-notecard-api
    name: Notecard API
    description: >-
      The Notecard API is the firmware-level JSON API for interacting with Blues
      Notecard hardware modules directly over serial or I2C. It supports card,
      dfu, env, file, hub, note, ntn, var, and web request categories for
      configuring and communicating with Notecard devices from host
      microcontrollers.
    humanURL: https://dev.blues.io/api-reference/notecard-api/introduction/
    baseURL: https://api.notefile.net
