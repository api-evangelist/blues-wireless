aid: blues-wireless
name: Blues
description: >-
  Blues (formerly Blues Wireless) is an IoT connectivity platform that provides
  hardware modules called Notecards and a cloud service called Notehub for
  routing device data from edge devices to cloud applications. The Notehub REST
  API enables developers to manage fleets of cellular, satellite, LoRa, and
  Wi-Fi connected devices across 130+ countries. Developers can use the API to
  retrieve device events, manage projects and fleets, configure routes to
  downstream cloud services, and monitor device health. Blues follows a
  consumption-based pricing model with no subscription fees, charging per
  ingressed event beyond a free monthly allowance bundled with each Notecard
  hardware purchase.
type: Index
