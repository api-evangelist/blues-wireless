  - aid: blues-wireless-notehub-api
    name: Notehub API
    description: >-
      The Notehub REST API provides programmatic access to Blues Notehub
      for managing IoT device fleets, routing events, configuring projects,
      monitoring device health, and handling billing. It covers authorization,
      billing accounts, devices, events, jobs, monitoring, organizations,
      projects, routes, and usage reporting.
